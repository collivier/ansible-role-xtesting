---
- name: Restart Docker
  become: true
  ansible.builtin.service:
    name: docker
    state: restarted
  notify:
    - Pause 10 seconds
- name: Pause 10 seconds
  ansible.builtin.pause:
    seconds: 10
- name: Wait Jenkins
  ansible.builtin.uri:
    url: "{{ jenkins_url }}"
    user: "{{ jenkins_user }}"
    password: "{{ jenkins_password }}"
    force_basic_auth: true
    method: GET
  register: _result
  until: _result.status == 200
  retries: "{{ ((jenkins_wait | int) / 5) | int }}"
  delay: 5
- name: Wait Cachet
  ansible.builtin.uri:
    url: "{{ cachet_url }}/ping"
    method: GET
  register: _result
  until: _result.status == 200
  retries: "{{ ((cachet_wait | int) / 5) | int }}"
  delay: 5
- name: Wait MongoDB
  ansible.builtin.pause:
    seconds: '{{ mongo_wait }}'
- name: Wait Kibana
  ansible.builtin.pause:
    seconds: '{{ kibana_wait }}'
- name: Wait Grafana
  ansible.builtin.uri:
    url: "{{ grafana_url }}/api/health"
    method: GET
  register: _result
  until: _result.status == 200
  retries: "{{ ((grafana_wait | int) / 5) | int }}"
  delay: 5
- name: Wait Fluentd
  ansible.builtin.pause:
    seconds: "{{ fluentd_wait }}"
- name: Wait PostgreSQL
  community.postgresql.postgresql_query:
    db: '{{ postgres_database }}'
    login_host: '{{ postgres_host }}'
    login_port: '{{ postgres_port }}'
    login_user: '{{ postgres_username }}'
    login_password: '{{ postgres_database }}'
    query: SELECT version()
  register: _result
  until: ("rowcount" in _result and _result.rowcount | int >= 1)
  retries: "{{ ((postgres_wait | int) / 5) | int }}"
  delay: 5
- name: Wait Elasticsearch
  ansible.builtin.pause:
    seconds: '{{ elasticsearch_wait }}'
- name: Wait GitLab
  ansible.builtin.uri:
    url: "{{ gitlab_url }}"
    method: GET
  register: _result
  until: _result.status == 200
  retries: "{{ ((gitlab_wait | int) / 5) | int }}"
  delay: 5
- name: Wait TestAPI
  ansible.builtin.uri:
    url: "{{ testapi_url }}/results"
    method: GET
  register: _result
  until: _result.status == 200
  retries: "{{ ((testapi_wait | int) / 5) | int }}"
  delay: 5
- name: Wait Gitea
  ansible.builtin.uri:
    url: "{{ gitea_url }}"
    method: GET
  register: _result
  until: _result.status == 200
  retries: "{{ ((gitea_wait | int) / 5) | int }}"
  delay: 5
- name: Wait Nexus
  ansible.builtin.uri:
    url: "{{ nexus_url }}/service/rest/v1/status"
    method: GET
  register: _result
  until: _result.status == 200
  retries: "{{ ((nexus_wait | int) / 5) | int }}"
  delay: 5
- name: Wait InfluxDB
  ansible.builtin.uri:
    url: "{{ influxdb_url }}/ping"
    method: GET
    status_code: 204
  register: _result
  until: _result.status == 204
  retries: "{{ ((influxdb_wait | int) / 5) | int }}"
  delay: 5
- name: Wait NGINX
  ansible.builtin.uri:
    url: "{{ nginx_url }}"
    method: GET
    validate_certs: false
  register: _result
  until: _result.status == 200
  retries: "{{ ((nginx_wait | int) / 5) | int }}"
  delay: 5
