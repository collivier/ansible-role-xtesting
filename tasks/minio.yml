---
- name: Creating {{ prefix }}/minio
  become: true
  file:
    path: '{{ prefix }}/minio'
    state: directory
  when:
    - minio_deploy
    - not use_kubernetes
- name: Starting Minio
  become: "{{ ansible_connection is defined }}"
  community.docker.docker_container:
    name: minio
    image: '{{ minio_docker_image }}:{{ minio_docker_tag }}'
    image_comparison: '{{ docker_image_comparison }}'
    pull: '{{ docker_pull }}'
    recreate: '{{ docker_recreate }}'
    restart_policy: '{{ docker_restart_policy }}'
    command: server /data --console-address :{{ minio_console_port }}
    env:
      MINIO_ACCESS_KEY: '{{ aws_access_key_id }}'
      MINIO_SECRET_KEY: '{{ aws_secret_access_key }}'
    published_ports:
      - '{{ minio_port }}:9000'
      - '{{ minio_console_port }}:9001'
    volumes:
      - '{{ prefix }}/minio:/data'
    container_default_behavior: no_defaults
  when:
    - minio_deploy
    - not use_kubernetes
    - not use_podman
- name: Starting Minio
  become: "{{ ansible_connection is defined }}"
  containers.podman.podman_container:
    name: minio
    image: '{{ minio_docker_image }}:{{ minio_docker_tag }}'
    recreate: '{{ docker_recreate }}'
    restart_policy: '{{ docker_restart_policy }}'
    cgroups: '{{ podman_cgroups }}'
    network: '{{ podman_network }}'
    command: server /data --console-address :{{ minio_console_port }}
    env:
      MINIO_ACCESS_KEY: '{{ aws_access_key_id }}'
      MINIO_SECRET_KEY: '{{ aws_secret_access_key }}'
    published_ports:
      - '{{ minio_port }}:9000'
      - '{{ minio_console_port }}:9001'
    volumes:
      - '{{ prefix }}/minio:/data'
  when:
    - minio_deploy
    - use_podman
- name: Adding Minio chart repository
  kubernetes.core.helm_repository:
    name: minio
    repo_url: https://charts.min.io/
  when:
    - minio_deploy
    - use_kubernetes
- name: Installing Minio helm chart
  kubernetes.core.helm:
    name: minio
    chart_ref: minio/minio
    chart_version: 5.4.0
    release_namespace: default
    update_repo_cache: '{{ helm_update_repo_cache }}'
    values:
      users:
        - accessKey: '{{ aws_access_key_id }}'
          secretKey: '{{ aws_secret_access_key }}'
          policy: consoleAdmin
      service:
        type: NodePort
        nodePort: '{{ minio_port }}'
      consoleService:
        type: NodePort
        nodePort: '{{ minio_console_port }}'
      resources:
    wait: true
  when:
    - minio_deploy
    - use_kubernetes
- name: Starting S3www
  become: "{{ ansible_connection is defined }}"
  community.docker.docker_container:
    name: s3www
    image: '{{ minio_s3www_docker_image }}:{{ minio_s3www_docker_tag }}'
    image_comparison: '{{ docker_image_comparison }}'
    pull: '{{ docker_pull }}'
    recreate: '{{ docker_recreate }}'
    restart_policy: '{{ docker_restart_policy }}'
    published_ports:
      - '{{ s3www_port }}:8080'
    env:
      ENDPOINT: 'http://{{ ipaddress }}:{{ minio_port }}'
      ACCESSKEY: '{{ aws_access_key_id }}'
      SECRETKEY: '{{ aws_secret_access_key }}'
      BUCKET: '{{ bucket }}'
    container_default_behavior: no_defaults
  when:
    - minio_deploy
    - not use_kubernetes
    - not use_podman
- name: Starting S3www
  become: "{{ ansible_connection is defined }}"
  containers.podman.podman_container:
    name: s3www
    image: '{{ minio_s3www_docker_image }}:{{ minio_s3www_docker_tag }}'
    recreate: '{{ docker_recreate }}'
    restart_policy: '{{ docker_restart_policy }}'
    cgroups: '{{ podman_cgroups }}'
    network: '{{ podman_network }}'
    published_ports:
      - '{{ s3www_port }}:8080'
    env:
      ENDPOINT: 'http://{{ ipaddress }}:{{ minio_port }}'
      ACCESSKEY: '{{ aws_access_key_id }}'
      SECRETKEY: '{{ aws_secret_access_key }}'
      BUCKET: '{{ bucket }}'
  when:
    - minio_deploy
    - not use_kubernetes
    - use_podman
- name: Starting S3www
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: s3www
        namespace: default
      spec:
        selector:
          matchLabels:
            app: s3www
        template:
          metadata:
            labels:
              app: s3www
          spec:
            containers:
            - name: s3www
              image: '{{ minio_s3www_docker_image }}:{{ minio_s3www_docker_tag }}'
              env:
              - name: ENDPOINT
                value: 'http://{{ ipaddress }}:{{ minio_port }}'
              - name: ACCESSKEY
                value: '{{ aws_access_key_id }}'
              - name: SECRETKEY
                value: '{{ aws_secret_access_key }}'
              - name: BUCKET
                value: '{{ bucket }}'
              ports:
              - containerPort: 8080
  when:
    - minio_deploy
    - use_kubernetes
- name: Exposing S3www
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: s3www
        namespace: default
      spec:
        type: NodePort
        selector:
          app: s3www
        ports:
        - protocol: TCP
          port: 8080
          targetPort: 8080
          nodePort: '{{ s3www_port }}'
  when:
    - minio_deploy
    - use_kubernetes